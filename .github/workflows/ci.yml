name: CI

on:
    push:
        branches:
            - main
            - develop
            - feature/**
            - fix/**
            - chore/**
    pull_request:
        branches:
            - main
            - develop

jobs:
    quality:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.4
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Tests (CI)
              run: npm run test:ci
